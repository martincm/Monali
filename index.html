<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f4f4f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        h3 { margin-top: 0; color: #333; }
        input {
            width: 85%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
        }
        button {
            width: 93%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            background-color: #546E7A;    /* Nuevo color */
            color: white;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #3f4f5f;    /* Tono más oscuro para el hover */
        }
        .error-msg { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div id="login" class="login-container">
        <div class="login-box">
            <h3>Sistema de Gestión</h3>
            <p style="color: #666; font-size: 14px;">Introduce tus credenciales para acceder</p>
            <!-- Nuevo campo usuario con valor por defecto -->
            <input type="text" id="user" value="Administrador" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña" onkeypress="checkEnter(event)">
            <button onclick="validar()">Ingresar</button>
            <div id="error" class="error-msg">Contraseña incorrecta</div>
        </div>
    </div>
    <script>
        // URL del formulario (Apps Script Web App)
        var APP_URL = "https://script.google.com/macros/s/AKfycbxZY420VyRMw1saj0SrDaugcl8VKAcAu1FCrGPKclAZssPTlonOUwTg82Gr61gVvJEn5w/exec";

        function validar() {
            // ========================================================
            //  CAMBIA EL TEXTO DE ABAJO POR LA CLAVE QUE TÚ QUIERAS
            // ========================================================
            var claveCorrecta = "asd";

            var input = document.getElementById("pass").value;
            var errorDiv = document.getElementById("error");

            if (input === claveCorrecta) {
                // Navegamos a la página completa (NO dentro de un iframe).
                // Esto es necesario para que el micrófono funcione: dentro de
                // un iframe (incluso con "allow") Google vuelve a envolver el
                // contenido en otro iframe interno que no podemos permisar,
                // y el navegador bloquea getUserMedia/SpeechRecognition.
                // Al navegar directo, el formulario pasa a ser la página
                // principal de la pestaña y el permiso de micrófono se pide
                // de forma normal.
                window.location.href = APP_URL;
            } else {
                errorDiv.style.display = "block";
                document.getElementById("pass").value = "";
            }
        }
        // Permite entrar también presionando la tecla Enter
        function checkEnter(e) {
            if (e.key === 'Enter') {
                validar();
            }
        }
    </script>
</body>
</html>
